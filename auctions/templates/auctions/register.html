{% extends "auctions/layout.html" %}

{% block body %}

{% if message %}
<div>{{ message }}</div>
{% endif %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card p-3 shadow-sm mt-5 align-items-center">
            <h2 class="mb-4">Register</h2>
            <form action="{% url 'register' %}" method="post" class="text-center">
        {% csrf_token %}
        <div class="form-group">
            <input class="form-control mb-1" autofocus type="text" name="username" placeholder="Username">
        </div>
        <div class="form-group">
            <input class="form-control mb-1" type="email" name="email" placeholder="Email Address">
        </div>
        <div class="form-group">
            <input class="form-control mb-1" type="password" name="password" placeholder="Password">
        </div>
        <div class="form-group">
            <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
        </div>
        <input class="btn btn-primary mt-3" type="submit" value="Register">
    </form>

    Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>
</div>

{% endblock %}
