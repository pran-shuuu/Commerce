{% extends "auctions/layout.html" %}

{% block body %}
<h2 class="m-4">Categories</h2>
<div class="list-group">
    {% for category in categories %}
            <a href="{% url 'category_view' category.name %}" class="list-group-item list-group-item-action ">{{ category.name }}</a>
        {% endfor %}
</div>
{% endblock %}
