{% extends "auctions/layout.html" %}

{% block body %}

{% if message %}
<div>{{ message }}</div>
{% endif %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card p-3 shadow-sm mt-5 align-items-center">
            <h2 class="mb-4">Login</h2>
            <form action="{% url 'login' %}" method="post" class="text-center">
                {% csrf_token %}
                <div class="form-group mb-1">
                    <input autofocus class="form-control" type="text" name="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <input class="form-control" type="password" name="password" placeholder="Password">
                </div>
                <input class="btn btn-primary mt-3" type="submit" value="Login">
            </form>

            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </div>
    </div>
</div>

{% endblock %}
